  <script>
/* ═══════════════════════════════════════════════════════════════════════════
   CONFIGURATION FIREBASE  (pour temps réel multi-appareils + connexion Google)
   ───────────────────────────────────────────────────────────────────────────
   SANS configuration : l'app marche en local (même navigateur), comptes et
   données sauvegardés sur l'appareil.

   POUR ACTIVER LE TEMPS RÉEL ENTRE APPAREILS + GOOGLE (5 minutes) :
   1. https://console.firebase.google.com  →  "Ajouter un projet"
   2. Build  →  Authentication  →  Commencer  →  "Sign-in method"
        →  activez "E-mail/Mot de passe" ET "Google"
   3. Build  →  Realtime Database  →  Créer une base  →  Mode test
   4. Paramètres du projet (roue dentée)  →  Web (</>)  →  copiez la config
   5. Collez la MÊME config dans craftweb-site.html ET craftweb-admin.html
   ═══════════════════════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:        "",
  authDomain:    "",
  databaseURL:   "",
  projectId:     "",
  appId:         ""
};

var CW_BACKEND = { firebase: false };
var fbAuth = null, fbDB = null, googleProvider = null;
var CW_BC = null;

(function initBackend() {
  var ok = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL;
  if (ok && window.firebase) {
    try {
      if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      fbAuth = firebase.auth();
      fbDB = firebase.database();
      googleProvider = new firebase.auth.GoogleAuthProvider();
      try { fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); } catch(e) {}
      CW_BACKEND.firebase = true;
      console.log("[CraftWeb] Firebase actif — temps réel + Google + cloud");
    } catch (e) {
      console.warn("[CraftWeb] Erreur Firebase, mode local:", e.message);
    }
  } else {
    console.log("[CraftWeb] Mode local (localStorage).");
  }
})();

  </script>

  <script>
    var Recharts = window.Recharts || {};
    try {
"use strict";
// ─────────────────────────────────────────────────────────────────────────────
// CRAFTWEB — Application complète (site client + admin)
// ─────────────────────────────────────────────────────────────────────────────
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const STORE_KEY = "cw-v1";
const DATA_VERSION = "cw-2025-v1";
const ADMIN_CREDS = { email: "admin@craftweb.pro", password: "CraftWeb2025" };
const SERVICES = [
    { id: "vitrine", name: "Site vitrine", price: 149, delivery: 7, popular: false,
        desc: "Un site soigné pour présenter votre activité et vos services.",
        features: ["Jusqu'à 5 pages", "Design responsive", "Formulaire contact", "Référencement de base", "Mise en ligne incluse"] },
    { id: "ecommerce", name: "Site e-commerce", price: 299, delivery: 21, popular: true,
        desc: "Une boutique complète pour vendre vos produits en ligne.",
        features: ["Catalogue produits", "Paiement sécurisé", "Gestion des stocks", "Comptes clients", "Tableau de bord ventes"] },
    { id: "appweb", name: "Application web", price: 399, delivery: 30, popular: false,
        desc: "Une application sur mesure avec espace utilisateur avancé.",
        features: ["Authentification", "Base de données", "Espace membre", "API et intégrations", "Hébergement configuré"] },
    { id: "portfolio", name: "Site portfolio", price: 129, delivery: 5, popular: false,
        desc: "Un portfolio soigné pour mettre vos projets en lumière.",
        features: ["Galerie de projets", "Animations soignées", "Page à propos", "Blog optionnel", "Optimisé mobile"] },
];
const STATUSES = ["Nouvelle", "En attente", "En cours", "Terminée", "Livrée", "Annulée"];
const STATUS_COLOR = {
    "Nouvelle": "#2563EB", "En attente": "#D97706", "En cours": "#7C3AED",
    "Terminée": "#0D9488", "Livrée": "#16A34A", "Annulée": "#DC2626"
};
const STATUS_BG = {
    "Nouvelle": "#EFF6FF", "En attente": "#FFFBEB", "En cours": "#F5F3FF",
    "Terminée": "#F0FDFA", "Livrée": "#F0FDF4", "Annulée": "#FEF2F2"
};
const SVC_COLOR = { vitrine: "#2563EB", ecommerce: "#0284C7", appweb: "#1D4ED8", portfolio: "#0369A1" };
const FAQ_ITEMS = [
    { q: "Combien de temps prend la création ?",

// ── HELPERS ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 10);
const oRef = () => "CMD-" + Math.random().toString(36).slice(2, 7).toUpperCase();
const fmtD = (iso) => iso ? new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" }) : "—";
const fmtM = (n) => new Intl.NumberFormat("fr-FR").format(n || 0) + " €";

const ini = (n) => (n || "?").trim().split(/\s+/).map(w => w[0] || "").slice(0, 2).join("").toUpperCase();
const tAgo = (iso) => {
    const s = (Date.now() - new Date(iso)) / 1000;
    if (s < 60)
        return "à l'instant";
    const m = s / 60;
    if (m < 60)
        return "il y a " + ~~m + "min";
    const h = m / 60;
    if (h < 24)
        return "il y a " + ~~h + "h";
    return "il y a " + ~~(h / 24) + "j";
};
const AV_COLORS = ["#2563EB", "#0284C7", "#1D4ED8", "#0369A1", "#0891B2"];
const avColor = (n) => AV_COLORS[[...(n || "?")].reduce((a, c) => a + c.charCodeAt(0), 0) % AV_COLORS.length];
// ── SEED (vide — seules les vraies données apparaissent) ─────────────────────
const mkSeed = () => ({ users: [], orders: [], messages: [], reviews: [], notifs: [] });
// ── CONTEXT ───────────────────────────────────────────────────────────────────
const DataCtx = React.createContext(null);
const useData = () => React.useContext(DataCtx);
// Traduction des erreurs Firebase
function fbErr(e) {
    const c = (e && e.code) || "";
    if (c.includes("email-already-in-use"))
        return "Un compte existe déjà avec cet email.";
    if (c.includes("invalid-email"))
        return "Email invalide.";
    if (c.includes("weak-password"))
        return "Mot de passe trop faible (6 caractères min).";
    if (c.includes("user-not-found") || c.includes("wrong-password") || c.includes("invalid-credential"))
        return "Email ou mot de passe incorrect.";
    if (c.includes("popup-closed"))
        return "Connexion Google annulée.";
    if (c.includes("popup-blocked"))
        return "Popup bloquée par le navigateur.";
    if (c.includes("network"))
        return "Erreur réseau. Vérifiez votre connexion.";
    return (e && e.message) ? e.message : "Une erreur est survenue.";
}
function DataProvider({ children }) {
    const [users, setUsers] = React.useState([]);
    const [orders, setOrders] = React.useState([]);
    const [messages, setMessages] = React.useState([]);
    const [reviews, setReviews] = React.useState([]);
    const [notifs, setNotifs] = React.useState([]);
    const [me, setMe] = React.useState(null);
    const [toasts, setToasts] = React.useState([]);
    const [dlg, setDlg] = React.useState(null);
    const [notifPanel, setNotifPanel] = React.useState(null);
    const [ready, setReady] = React.useState(false);
    const echo = React.useRef(false);
    const stateRef = React.useRef({ users: [], orders: [], messages: [], reviews: [], notifs: [] });
    const meRef = React.useRef(null);
    React.useEffect(() => { stateRef.current = { users, orders, messages, reviews, notifs }; }, [users, orders, messages, reviews, notifs]);
    React.useEffect(() => { meRef.current = me; }, [me]);
    // Applique des données entrantes (depuis Firebase ou local) sans redéclencher la sauvegarde
    const applyData = React.useCallback((d) => {
        if (!d)
            return;
        echo.current = true;
        setUsers(Array.isArray(d.users) ? d.users : []);
        setOrders(Array.isArray(d.orders) ? d.orders : []);
        setMessages(Array.isArray(d.messages) ? d.messages : []);
        setReviews(Array.isArray(d.reviews) ? d.reviews : []);
        setNotifs(Array.isArray(d.notifs) ? d.notifs : []);
        setTimeout(() => { echo.current = false; }, 60);
    }, []);
    // ── INITIALISATION ──
    React.useEffect(() => {
        if (CW_BACKEND.firebase) {
            // --- Mode Firebase ---
            const ref = fbDB.ref("appdata");
            ref.on("value", (snap) => { const v = snap.val(); if (v)
                applyData(v); });
            ref.once("value").then(() => setReady(true)).catch(() => setReady(true));
            const unsub = fbAuth.onAuthStateChanged(async (user) => {
                if (user) {
                    let snap;
                    try {
                        snap = await fbDB.ref("appdata/users").once("value");
                    }
                    catch (e) {
                        snap = null;
                    }
                    const arr = snap && snap.val() ? snap.val() : [];
                    const list = Array.isArray(arr) ? arr : Object.values(arr);
                    let prof = list.find((x) => x && x.id === user.uid);
                    if (!prof) {
                        const dn = (user.displayName || "").trim().split(/\s+/);
                        prof = {
                            id: user.uid, email: user.email || "",
                            firstName: dn[0] || "Client", lastName: dn.slice(1).join(" ") || "",
                            phone: "", role: "client", createdAt: new Date().toISOString(),
                            photo: user.photoURL || null
                        };
                        setUsers((p) => [...p.filter((x) => x.id !== prof.id), prof]);
                    }
                    setMe(prof);
                }
                else {
                    setMe(null);
                }
            });
            return () => { ref.off(); unsub(); };
        }
        else {
            // --- Mode local (localStorage + BroadcastChannel) ---
            try {
                const raw = localStorage.getItem("cw-data");
                if (raw)
                    applyData(JSON.parse(raw));
                const sess = localStorage.getItem("cw-session");
                if (raw && sess) {
                    const d = JSON.parse(raw);
                    const u = (d.users || []).find((x) => x.id === sess);
                    if (u)
                        setMe(u);
                }
            }
            catch (e) { }
            setReady(true);
            try {
                CW_BC = new BroadcastChannel("craftweb-sync");
                CW_BC.onmessage = (e) => { if (e.data)
                    applyData(e.data); };
            }
            catch (e) {
                CW_BC = null;
            }
        }
    }, []);
    // ── SAUVEGARDE (à chaque changement, hors echo) ──
    React.useEffect(() => {
        if (!ready || echo.current)
            return;
        const data = { users, orders, messages, reviews, notifs };
        if (CW_BACKEND.firebase) {
            fbDB.ref("appdata").set(data).catch(() => { });
        }
        else {
            try {
                localStorage.setItem("cw-data", JSON.stringify(data));
            }
            catch (e) { }
            if (CW_BC) {
                try {
                    CW_BC.postMessage(data);
                }
                catch (e) { }
            }
        }
    }, [users, orders, messages, reviews, notifs, ready]);
    // ── TOAST / DIALOG ──
    const toast = (msg, type = "ok") => {
        const id = uid();
        setToasts((t) => [...t, { id, msg, type }]);
        setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 3000);
    };
    const confirm = (cfg) => setDlg(cfg);
    const addN = (n) => setNotifs((p) => [Object.assign({ id: uid(), read: false, createdAt: new Date().toISOString() }, n), ...p]);
    // ── AUTH ──
    const register = async (d) => {
        if (CW_BACKEND.firebase) {
            try {
                const cred = await fbAuth.createUserWithEmailAndPassword(d.email, d.password);
                const u = cred.user;
                const prof = { id: u.uid, email: d.email, firstName: d.firstName, lastName: d.lastName,
                    phone: d.phone || "", role: "client", createdAt: new Date().toISOString(), photo: null };
                setUsers((p) => [...p.filter((x) => x.id !== prof.id), prof]);
                setMe(prof);
                return { ok: true, user: prof };
            }
            catch (e) {
                return { ok: false, err: fbErr(e) };
            }
        }
        else {
            if (stateRef.current.users.some((x) => x.email.toLowerCase() === d.email.toLowerCase()))
                return { ok: false, err: "Un compte existe déjà avec cet email." };
            const u = Object.assign({ id: uid(), role: "client", createdAt: new Date().toISOString(), photo: null }, d);
            setUsers((p) => [...p, u]);
            setMe(u);
            try {
                localStorage.setItem("cw-session", u.id);
            }
            catch (e) { }
            return { ok: true, user: u };
        }
    };
    const login = async (email, pw) => {
        if (CW_BACKEND.firebase) {
            try {
                await fbAuth.signInWithEmailAndPassword(email, pw);
                return { ok: true };
            }
            catch (e) {
                return { ok: false, err: fbErr(e) };
            }
        }
        else {
            const u = stateRef.current.users.find((x) => x.email.toLowerCase() === email.toLowerCase() && x.password === pw);
            if (!u)
                return { ok: false, err: "Email ou mot de passe incorrect." };
            setMe(u);
            try {
                localStorage.setItem("cw-session", u.id);
            }
            catch (e) { }
            return { ok: true, user: u };
        }
    };
    const loginGoogle = async () => {
        if (!CW_BACKEND.firebase)
            return { ok: false, err: "La connexion Google nécessite la configuration Firebase (voir le haut du fichier)." };
        try {
            const cred = await fbAuth.signInWithPopup(googleProvider);
            const u = cred.user;
            const exists = stateRef.current.users.find((x) => x.id === u.uid);
            if (!exists) {
                const dn = (u.displayName || "").trim().split(/\s+/);
                const prof = { id: u.uid, email: u.email || "", firstName: dn[0] || "Client",
                    lastName: dn.slice(1).join(" ") || "", phone: "", role: "client",
                    createdAt: new Date().toISOString(), photo: u.photoURL || null };
                setUsers((p) => [...p.filter((x) => x.id !== prof.id), prof]);
                setMe(prof);
            }
            return { ok: true };
        }
        catch (e) {
            return { ok: false, err: fbErr(e) };
        }
    };
    const logout = async () => {
        if (CW_BACKEND.firebase) {
            try {
                await fbAuth.signOut();
            }
            catch (e) { }
        }
        else {
            try {
                localStorage.removeItem("cw-session");
            }
            catch (e) { }
        }
        setMe(null);
    };
    const updateMe = (patch) => {
        if (!meRef.current)
            return;
        const id = meRef.current.id;
        setUsers((p) => p.map((u) => u.id === id ? Object.assign(Object.assign({}, u), patch) : u));
        setMe((c) => (Object.assign(Object.assign({}, c), patch)));
    };
    // ── COMMANDES ──
    const createOrder = (d) => {
        const svc = SERVICES.find((x) => x.id === d.serviceId);
        const o = {
            id: uid(), ref: oRef(), status: "Nouvelle",
            createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
            serviceId: d.serviceId, serviceName: svc ? svc.name : "", price: svc ? svc.price : 0,
            userId: d.userId || (meRef.current ? meRef.current.id : null),
            clientName: (d.firstName + " " + d.lastName).trim(),
            firstName: d.firstName, lastName: d.lastName, email: d.email, phone: d.phone,
            description: d.description || "", files: d.files || []
        };
        setOrders((p) => [o, ...p]);
        addN({ audience: "admin", type: "order", text: "Nouvelle commande — " + o.serviceName + " · " + o.clientName });
        return o;
    };
    const updateOrder = (id, patch) => setOrders((p) => p.map((o) => o.id === id ? Object.assign(Object.assign(Object.assign({}, o), patch), { updatedAt: new Date().toISOString() }) : o));
    const updateStatus = (id, status) => {
        const o = stateRef.current.orders.find((x) => x.id === id);
        setOrders((p) => p.map((x) => x.id === id ? Object.assign(Object.assign({}, x), { status, updatedAt: new Date().toISOString() }) : x));
        if (o && o.userId)
            addN({ audience: o.userId, type: "status", text: "Votre commande " + o.serviceName + " est maintenant : " + status });
    };
    const cancelOrder = (id) => updateStatus(id, "Annulée");
    const deleteOrder = (id) => { setOrders((p) => p.filter((o) => o.id !== id)); toast("Commande supprimée."); };
    // ── UTILISATEURS ──
    const addUser = (d) => setUsers((p) => [...p, Object.assign({ id: uid(), role: "client", createdAt: new Date().toISOString() }, d)]);
    const updateUser = (id, patch) => setUsers((p) => p.map((u) => u.id === id ? Object.assign(Object.assign({}, u), patch) : u));
    const deleteUser = (id) => { setUsers((p) => p.filter((u) => u.id !== id)); toast("Utilisateur supprimé."); };
    // ── MESSAGES ──
    const sendMsg = (userId, sender, text) => {
        if (!text || !text.trim())
            return;
        const msg = { id: uid(), userId, sender, text: text.trim(), createdAt: new Date().toISOString(), read: false };
        setMessages((p) => [...p, msg]);
        if (sender === "client")
            addN({ audience: "admin", type: "message", text: "Nouveau message d'un client" });
        else
            addN({ audience: userId, type: "message", text: "Nouveau message de l'équipe CraftWeb" });
    };
    const markRead = (userId, side) => setMessages((p) => p.map((m) => m.userId === userId && m.sender !== side ? Object.assign(Object.assign({}, m), { read: true }) : m));
    const markConvRead = (userId) => setMessages((p) => p.map((m) => m.userId === userId && m.sender === "client" ? Object.assign(Object.assign({}, m), { read: true }) : m));
    // ── AVIS ──
    const addReview = (d) => setReviews((p) => [Object.assign({ id: uid(), approved: false, createdAt: new Date().toISOString() }, d), ...p]);
    const approveReview = (id, v) => setReviews((p) => p.map((r) => r.id === id ? Object.assign(Object.assign({}, r), { approved: v }) : r));
    const deleteReview = (id) => { setReviews((p) => p.filter((r) => r.id !== id)); toast("Avis supprimé."); };
    // ── NOTIFS ──
    const markN = (id) => setNotifs((p) => p.map((n) => n.id === id ? Object.assign(Object.assign({}, n), { read: true }) : n));
    const markAllN = (aud) => setNotifs((p) => p.map((n) => n.audience === aud ? Object.assign(Object.assign({}, n), { read: true }) : n));
    const val = {
        users, orders, messages, reviews, notifs, me, ready,
        backendMode: CW_BACKEND.firebase ? "firebase" : "local",
        toast, confirm,
        login, register, loginGoogle, logout, updateMe,
        createOrder, updateOrder, updateStatus, cancelOrder, deleteOrder,
        addUser, updateUser, deleteUser,
        sendMsg, markRead, markConvRead,
        addReview, approveReview, deleteReview,
        markN, markAllN,
        openNotifs: (aud) => setNotifPanel(aud)
    };
    return React.createElement(DataCtx.Provider, { value: val }, children, 
    // Toasts
